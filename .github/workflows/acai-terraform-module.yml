name: ACAI TERRAFORM MODULE

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  tf_module_checks:
    uses: acai-solutions/github-workflows/.github/workflows/checks-py-hcl-module.yml@main
    if: ${{ github.event_name == 'pull_request' || endsWith(github.ref_name, '_ai') }}
    with:
      py_version: "3.12"
      py_source_path: "."
      py_lint_include: true
      py_lint_allow_failures: false
      py_testing_include: true
      hcl_docs_skip: true
      hcl_test_beds: '["AWS", "AWS_ESC"]'
      hcl_test_bed_aws_terratest_configs: '["aws/matrix_tf1x5x7_aws6x0x0.json", "aws/matrix_ofu1x6x0_aws6x0x0.json"]'
      hcl_test_bed_aws_esc_terratest_configs: '["aws/matrix_tf1x14x0_aws6x29x0.json", "aws/matrix_ofu1x9x0_aws6x29x0_only.json"]'
      #hcl_test_beds: '["AWS"]'
      #hcl_test_bed_aws_terratest_configs: '["aws/matrix_tf1x5x7_aws6x0x0.json"]'
      #hcl_test_bed_aws_esc_terratest_configs: '["aws/matrix_tf1x5x7_aws6x0x0.json"]'
    secrets: inherit
    
  tf_module_release:
    uses: acai-solutions/github-workflows/.github/workflows/hcl-module-release.yml@main
    if: ${{ github.event_name == 'push' }}
    secrets: inherit
